name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t devops-render-app .

    - name: Run Container Test
      run: |
        docker run -d -p 10000:10000 devops-render-app
        sleep 5
        curl http://localhost:10000